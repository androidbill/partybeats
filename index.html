<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101827">
  <meta name="description" content="Party Beats lets guests join a room, add songs, react, and share the queue.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <title>Party Beats</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090d13;
      --panel: #111824;
      --panel-2: #172131;
      --line: #263347;
      --text: #f6f8fb;
      --muted: #aab5c4;
      --accent: #00c2a8;
      --accent-2: #ff3d7f;
      --gold: #f6b543;
      --danger: #ff647c;
      --shadow: 0 20px 60px rgba(0, 0, 0, .36);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 0%, rgba(0, 194, 168, .18), transparent 30rem),
        radial-gradient(circle at 100% 10%, rgba(255, 61, 127, .16), transparent 26rem),
        linear-gradient(180deg, #0d121b 0%, var(--bg) 58%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    button, input, textarea { font: inherit; }
    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      color: #06130f;
      background: var(--accent);
      padding: 0 14px;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary { color: var(--text); background: #253247; }
    button.ghost { color: var(--text); background: transparent; border: 1px solid var(--line); }
    button.danger { color: #21040a; background: var(--danger); }
    button.icon { width: 44px; padding: 0; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: #0c121c;
      outline: 0;
      padding: 13px 14px;
    }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 194, 168, .14); }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 13px; font-weight: 700; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: clamp(42px, 13vw, 72px); line-height: .88; letter-spacing: 0; margin-bottom: 14px; }
    h2 { font-size: 22px; margin-bottom: 12px; }
    h3 { font-size: 16px; margin-bottom: 8px; }
    p, small { color: var(--muted); }
    .hidden { display: none !important; }

    .shell { width: min(100%, 1080px); margin: 0 auto; padding: 18px; }
    .auth {
      min-height: 100svh;
      display: grid;
      align-items: center;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
      gap: 28px;
    }
    .brand-mark {
      width: 86px;
      height: 86px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      color: #06130f;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      font-size: 48px;
      font-weight: 1000;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }
    .hero-copy p { max-width: 520px; font-size: 18px; line-height: 1.55; }
    .panel {
      background: rgba(17, 24, 36, .86);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(18px);
    }
    .stack { display: grid; gap: 12px; }
    .row { display: flex; gap: 10px; align-items: center; }
    .row > * { min-width: 0; }
    .row .grow { flex: 1; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fine { font-size: 12px; line-height: 1.45; }
    .error { color: #ff9aae; }
    .success { color: #7ff0d7; }

    .app {
      min-height: 100svh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100svh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 18px;
      background: rgba(9, 13, 19, .86);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }
    .side-brand { display: flex; gap: 12px; align-items: center; }
    .side-logo {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #06130f;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      font-weight: 1000;
    }
    .room-code {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border: 1px solid rgba(246, 181, 67, .45);
      border-radius: 8px;
      color: var(--gold);
      background: rgba(246, 181, 67, .09);
      font-size: 22px;
      letter-spacing: 4px;
      font-weight: 1000;
    }
    .nav { display: grid; gap: 8px; }
    .nav button {
      justify-content: flex-start;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
    }
    .nav button.active {
      color: var(--text);
      background: var(--panel-2);
      border-color: var(--line);
    }
    .main { padding: 20px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      color: var(--muted);
      background: rgba(23, 33, 49, .7);
      font-size: 12px;
      font-weight: 800;
    }
    .badge.host { color: #2b1800; background: var(--gold); border-color: var(--gold); }
    .grid { display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(280px, .8fr); gap: 16px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .now {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }
    .cover {
      width: 78px;
      height: 78px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #06130f;
      background: linear-gradient(135deg, var(--accent-2), var(--gold));
      font-size: 34px;
      font-weight: 1000;
    }
    .meter { height: 7px; border-radius: 99px; background: #263347; overflow: hidden; margin-top: 10px; }
    .meter i { display: block; height: 100%; width: 42%; background: linear-gradient(90deg, var(--accent), var(--gold)); }
    .player {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 8px;
      background: #05080d;
      margin-top: 14px;
    }
    .song {
      display: grid;
      grid-template-columns: 34px 52px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }
    .song:first-child { border-top: 0; }
    .song-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 850; }
    .mini-cover {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #06130f;
      background: linear-gradient(135deg, #64d8ff, #f6b543);
      font-weight: 1000;
    }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .actions button { min-height: 34px; padding: 0 9px; font-size: 12px; }
    .result, .member, .history-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }
    .result:first-child, .member:first-child, .history-row:first-child { border-top: 0; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .suggestions button {
      min-height: 34px;
      border: 1px solid var(--line);
      color: var(--text);
      background: #172131;
      border-radius: 999px;
      padding: 0 11px;
      font-size: 12px;
      font-weight: 800;
    }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #06130f;
      background: var(--accent);
      font-weight: 1000;
      flex: 0 0 auto;
    }
    .switch-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }
    .switch-row:first-child { border-top: 0; }
    .switch-row input { width: auto; }
    .settings-note { border-color: rgba(255, 100, 124, .45); background: rgba(255, 100, 124, .08); }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }
    .join-popup {
      position: fixed;
      z-index: 30;
      right: 18px;
      bottom: 18px;
      width: min(360px, calc(100vw - 36px));
      background: var(--panel);
      border: 1px solid rgba(246, 181, 67, .55);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .join-popup h3 { margin-bottom: 4px; }
    .join-popup .member { border-top: 0; padding-bottom: 0; }

    @media (max-width: 820px) {
      .auth { grid-template-columns: 1fr; align-content: center; }
      .hero-copy p { font-size: 16px; }
      .app { display: block; padding-bottom: 74px; }
      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .sidebar .nav {
        position: fixed;
        z-index: 10;
        bottom: 0;
        left: 0;
        right: 0;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
        padding: 8px;
        background: rgba(9, 13, 19, .94);
        border-top: 1px solid var(--line);
        backdrop-filter: blur(16px);
      }
      .nav button { justify-content: center; padding: 0 6px; font-size: 13px; }
      .main { padding: 14px; }
      .topbar { display: grid; }
      .grid { grid-template-columns: 1fr; }
      .split { grid-template-columns: 1fr; }
      .now { grid-template-columns: 64px minmax(0, 1fr); }
      .now .cover { width: 64px; height: 64px; }
      .now .actions { grid-column: 1 / -1; justify-content: stretch; }
      .now .actions button { flex: 1; }
      .song { grid-template-columns: 26px 44px minmax(0, 1fr); }
      .song .actions { grid-column: 1 / -1; justify-content: stretch; }
      .song .actions button { flex: 1; }
      .join-popup { bottom: 84px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      browserLocalPersistence,
      browserPopupRedirectResolver,
      initializeAuth,
      onAuthStateChanged,
      setPersistence,
      signInAnonymously,
      signInWithPopup,
      signInWithRedirect,
      getRedirectResult,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      deleteDoc,
      doc,
      getDoc,
      increment,
      limit,
      onSnapshot,
      orderBy,
      query,
      serverTimestamp,
      setDoc,
      updateDoc,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJ8FZwsl8S51SOM7ZMQEE7I9B12Vg0xho",
      authDomain: "partybeats-7c0fe.firebaseapp.com",
      projectId: "partybeats-7c0fe",
      storageBucket: "partybeats-7c0fe.firebasestorage.app",
      messagingSenderId: "199585277181",
      appId: "1:199585277181:web:157432c91d5575a9d8ca94",
      measurementId: "G-2MZ6CRLCRK"
    };

    const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    const seedSongs = [
      ["The Weeknd", "Blinding Lights", "3:20", "fHI8X4OXluQ"],
      ["Dua Lipa", "Levitating", "3:23", "TUVcZfQe-Kw"],
      ["Earth, Wind & Fire", "September", "3:35", "Gs069dndIYk"],
      ["Rihanna", "We Found Love", "3:36", "tg00YEETFzg"],
      ["Daft Punk", "One More Time", "5:20", "FGBhQbmPwH8"]
    ];
    const suggestionSeeds = [
      "The Weeknd Blinding Lights",
      "Dua Lipa Levitating",
      "Earth Wind and Fire September",
      "Rihanna We Found Love",
      "Daft Punk One More Time",
      "Beyonce CUFF IT",
      "Bruno Mars Uptown Funk",
      "Whitney Houston I Wanna Dance With Somebody",
      "ABBA Dancing Queen",
      "Calvin Harris Feel So Close",
      "Avicii Wake Me Up",
      "Black Eyed Peas I Gotta Feeling",
      "Pitbull Give Me Everything",
      "Mark Ronson Uptown Funk",
      "Taylor Swift Shake It Off",
      "Lady Gaga Just Dance"
    ];

    const app = initializeApp(firebaseConfig);
    let auth;
    try {
      auth = initializeAuth(app, {
        persistence: [browserLocalPersistence],
        popupRedirectResolver: browserPopupRedirectResolver
      });
    } catch {
      auth = getAuth(app);
    }
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);
    const root = document.getElementById("app");
    const authReady = setPersistence(auth, browserLocalPersistence).catch((error) => {
      console.warn("Party Beats auth persistence failed", error);
    });

    const params = new URLSearchParams(location.search);
    const initialRoom = cleanRoom(params.get("room") || localStorage.getItem("partyBeatsRoom") || "");
    const initialTab = cleanTab(params.get("tab") || sessionStorage.getItem("partyBeatsTab") || "queue");
    const state = {
      booted: false,
      busy: false,
      user: null,
      nickname: localStorage.getItem("partyBeatsName") || "",
      pendingRoom: initialRoom,
      authMode: localStorage.getItem("partyBeatsAuthMode") || "",
      pendingJoin: null,
      roomId: "",
      room: null,
      member: null,
      tab: initialTab,
      queue: [],
      members: [],
      joinRequests: [],
      history: [],
      songQuery: "",
      suggestions: [],
      message: "",
      error: "",
      unsub: [],
      joinRequestsUnsub: null
    };

    const bootFallback = setTimeout(() => {
      if (state.booted) return;
      state.user = auth.currentUser || readCachedUser();
      state.booted = true;
      state.busy = false;
      if (!state.user && sessionStorage.getItem("partyBeatsReturningFromGoogle")) {
        state.error = "Google returned to Party Beats, but Firebase did not provide a signed-in session. Check Firebase Auth authorized domains for localhost and this exact host.";
        sessionStorage.removeItem("partyBeatsReturningFromGoogle");
      } else if (!state.user) {
        state.message = "Ready. Continue with Google to start.";
      }
      render();
    }, 10000);

    authReady.then(() => getRedirectResult(auth)).then((result) => {
      if (result?.user) acceptUser(result.user);
    }).catch((error) => {
      state.error = friendlyAuthError(error);
      state.booted = true;
      state.busy = false;
      render();
    });

    onAuthStateChanged(auth, async (user) => {
      clearTimeout(bootFallback);
      if (user) cacheUser(user);
      state.user = user || readCachedUser();
      state.booted = true;
      state.busy = false;
      if (user && !state.nickname) state.nickname = user.displayName || "";
      if (state.user && initialRoom && !state.roomId) {
        await restoreRoomAfterRefresh(initialRoom);
        return;
      }
      render();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    function render() {
      if (!state.booted) {
        root.innerHTML = layoutAuth({ loading: true });
        return;
      }
      if (state.pendingJoin) {
        root.innerHTML = layoutJoinPending();
        bind();
        return;
      }
      if (state.user && state.roomId) {
        if (root.querySelector(".app")) {
          updateApp();
          return;
        }
        root.innerHTML = layoutApp();
        bind();
        return;
      }
      root.innerHTML = layoutAuth();
      bind();
    }

    function layoutAuth(options = {}) {
      const guestMode = isGuestUser();
      const step = !state.user ? "Step 1: Sign in or join as guest" : "Step 2: Choose your party setup";
      const displayName = guestMode ? "Guest" : (state.user?.displayName || state.user?.email || "");
      return `
        <main class="shell auth">
          <section class="hero-copy">
            <div class="brand-mark">PB</div>
            <h1>Party<br>Beats</h1>
            <p>One shared room for the playlist. Guests sign in, pick a nickname, add tracks, react to songs, and the host keeps control of playback.</p>
          </section>
          <section class="panel stack" aria-label="Party Beats setup">
            <div>
              <h2>${escapeHtml(step)}</h2>
              ${state.user ? `<p class="fine">${guestMode ? "Joining as guest. Nickname and room code are required." : `Signed in as ${escapeHtml(displayName)}.`}</p>` : `<p class="fine">Hosts use Google. Guests can join without a Google account, with host approval.</p>`}
            </div>
            ${state.error ? `<p class="error">${escapeHtml(state.error)}</p>` : ""}
            ${state.message ? `<p class="success">${escapeHtml(state.message)}</p>` : ""}
            ${options.loading ? `<button disabled>Loading...</button>` : ""}
            ${!options.loading && !state.user ? `
              <button data-action="signin" ${state.busy ? "disabled" : ""}>${state.busy ? "Opening Google..." : "Continue with Google"}</button>
              <button class="secondary" data-action="guest-auth" ${state.busy ? "disabled" : ""}>Join as Guest</button>
              ${isLocalTestHost() ? `<button class="ghost" data-action="local-test">Test locally without Google</button>` : ""}
            ` : ""}
            ${state.user ? `
              <label>Nickname
                <input data-field="nickname" autocomplete="nickname" maxlength="28" value="${escapeAttr(state.nickname)}" placeholder="What should the room call you?">
              </label>
              <div class="split">
                <button data-action="create" ${state.busy || guestMode ? "disabled" : ""}>Create Room</button>
                <button class="secondary" data-action="join" ${state.busy ? "disabled" : ""}>Join Room</button>
              </div>
              <label>Room code
                <input data-field="pendingRoom" inputmode="text" maxlength="6" value="${escapeAttr(state.pendingRoom)}" placeholder="ABC123">
              </label>
              <button class="ghost" data-action="signout">Sign out</button>
            ` : ""}
            <p class="fine">${guestMode ? "Guest requests are sent to the host for approval before joining." : "Room codes are random 6-character alphanumeric codes. Host-only controls stay locked for guests."}</p>
          </section>
        </main>`;
    }

    function layoutJoinPending() {
      return `
        <main class="shell auth">
          <section class="hero-copy">
            <div class="brand-mark">PB</div>
            <h1>Party<br>Beats</h1>
            <p>Your request has been sent to the host.</p>
          </section>
          <section class="panel stack" aria-label="Waiting for host approval">
            <div>
              <h2>Waiting for host</h2>
              <p class="fine">${escapeHtml(state.pendingJoin.name)} wants to join room ${escapeHtml(state.pendingJoin.roomId)}.</p>
            </div>
            ${state.error ? `<p class="error">${escapeHtml(state.error)}</p>` : ""}
            ${state.message ? `<p class="success">${escapeHtml(state.message)}</p>` : ""}
            <button class="ghost" data-action="cancel-join">Cancel request</button>
          </section>
        </main>`;
    }

    function layoutApp() {
      const isHost = isCurrentHost();
      const now = state.room?.now || null;
      return `
        <div class="app">
          <aside class="sidebar">
            <div class="side-brand">
              <div class="side-logo">PB</div>
              <div>
                <strong>Party Beats</strong><br>
                <small>${escapeHtml(state.member?.name || state.nickname)} ${isHost ? "Host" : "Guest"}</small>
              </div>
            </div>
            <div class="stack">
              <small>Room</small>
              <div class="room-code">${escapeHtml(state.roomId)}</div>
              <div class="row">
                <button class="secondary grow" data-action="copy-link">Copy Link</button>
                <button class="ghost icon" data-action="share" title="Share">...</button>
              </div>
            </div>
            ${layoutHostPlayer(isHost)}
            <nav class="nav" aria-label="Main">
              ${navButton("queue", "Queue")}
              ${navButton("add", "Add")}
              ${navButton("people", "People")}
              ${navButton("settings", "Settings")}
            </nav>
            <button class="ghost" data-action="leave">Leave Room</button>
          </aside>
          <main class="main" data-main>${layoutMain()}</main>
          <div data-join-popup>${layoutFloatingJoinPopup()}</div>
        </div>`;
    }

    function layoutMain() {
      const isHost = isCurrentHost();
      const now = state.room?.now || null;
      return `
        <div class="topbar">
          <div>
            <span class="badge ${isHost ? "host" : ""}">${isHost ? "Host controls enabled" : "Guest mode"}</span>
            <h2>${escapeHtml(tabTitle())}</h2>
          </div>
          <div class="badge">${state.queue.length} queued</div>
        </div>
        ${state.error ? `<p class="error">${escapeHtml(state.error)}</p>` : ""}
        ${state.message ? `<p class="success">${escapeHtml(state.message)}</p>` : ""}
        ${state.tab === "queue" ? viewQueue(now, isHost) : ""}
        ${state.tab === "add" ? viewAdd() : ""}
        ${state.tab === "people" ? viewPeople() : ""}
        ${state.tab === "settings" ? viewSettings(isHost) : ""}`;
    }

    function layoutFloatingJoinPopup() {
      if (!isCurrentHost() || !state.joinRequests.length) return "";
      const request = state.joinRequests[0];
      const more = state.joinRequests.length > 1 ? ` +${state.joinRequests.length - 1} more waiting` : "";
      return `
        <aside class="join-popup" role="dialog" aria-live="assertive" aria-label="Guest join request">
          <h3>Guest wants to join</h3>
          <small>${escapeHtml(more || "Approve or deny this request.")}</small>
          <div class="member">
            <div class="row">
              <div class="avatar">${escapeHtml(initials(request.name))}</div>
              <div><strong>${escapeHtml(request.name || "Guest")}</strong><br><small>Waiting for host confirmation</small></div>
            </div>
            <div class="actions">
              <button data-action="approve-guest" data-id="${escapeAttr(request.id)}">Allow</button>
              <button class="danger" data-action="deny-guest" data-id="${escapeAttr(request.id)}">Deny</button>
            </div>
          </div>
        </aside>`;
    }

    function layoutHostPlayer(isHost) {
      return `<div data-host-player>${hostPlayerContent(isHost)}</div>`;
    }

    function hostPlayerContent(isHost) {
      const now = state.room?.now || null;
      if (!isHost) return "";
      if (!now?.youtubeId) {
        return `<div class="card"><strong>Host Player</strong><br><small>Start a playable YouTube song to keep music running here.</small></div>`;
      }
      return `
        <div class="card" data-video-id="${escapeAttr(now.youtubeId)}">
          <strong>Host Player</strong>
          <iframe
            class="player"
            title="${escapeAttr(`${now.artist || "Party Beats"} - ${now.title || "Now playing"}`)}"
            src="https://www.youtube.com/embed/${escapeAttr(now.youtubeId)}?autoplay=1&playsinline=1&rel=0"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen></iframe>
        </div>`;
    }

    function navButton(tab, label) {
      return `<button class="${state.tab === tab ? "active" : ""}" data-tab="${tab}">${label}</button>`;
    }

    function tabTitle() {
      return { queue: "Live Queue", add: "Add Songs", people: "People", settings: "Room Settings" }[state.tab] || "Party Beats";
    }

    function viewQueue(now, isHost) {
      return `
        <div class="grid">
          <section class="card">
            <h3>Now Playing</h3>
            <div class="now">
              <div class="cover">PB</div>
              <div>
                <div class="song-title">${escapeHtml(now ? `${now.artist} - ${now.title}` : "No song playing")}</div>
                <small>${escapeHtml(now ? `${now.duration || "3:30"} from ${now.addedBy || "the room"}` : "The host can start the next queued song.")}</small>
                <div class="meter"><i></i></div>
              </div>
              <div class="actions">
                <button data-action="skip" ${isHost ? "" : "disabled"}>${now ? "Skip" : "Start"}</button>
              </div>
            </div>
            ${now?.youtubeId && isHost ? `<div class="empty" style="margin-top: 14px;">The host player is active in the sidebar, so music keeps playing while you use the app.</div>` : ""}
            ${now?.youtubeId && !isHost ? `<div class="empty" style="margin-top: 14px;">The host device is playing this track.</div>` : ""}
            ${now && !now.youtubeId ? `<div class="empty" style="margin-top: 14px;">This song has no playable YouTube link.</div>` : ""}
          </section>
          <section class="card">
            <h3>Recently Played</h3>
            ${state.history.length ? state.history.map(song => `
              <div class="history-row">
                <div><strong>${escapeHtml(song.title)}</strong><br><small>${escapeHtml(song.artist || "Unknown artist")}</small></div>
                <small>${escapeHtml(song.addedBy || "")}</small>
              </div>`).join("") : `<div class="empty">Played songs will show up here.</div>`}
          </section>
        </div>
        <section class="card" style="margin-top: 16px;">
          <h3>Up Next</h3>
          ${state.queue.length ? state.queue.map((song, index) => layoutSong(song, index, isHost)).join("") : `<div class="empty">No songs yet. Add the first track.</div>`}
        </section>`;
    }

    function layoutSong(song, index, isHost) {
      const canRemove = isHost || state.room?.settings?.guestRemove;
      const canMove = isHost || state.room?.settings?.guestReorder;
      return `
        <div class="song">
          <strong>${index + 1}</strong>
          <div class="mini-cover">${escapeHtml(initials(song.title))}</div>
          <div>
            <div class="song-title">${escapeHtml(song.artist ? `${song.artist} - ${song.title}` : song.title)}</div>
            <small>${escapeHtml(`${song.duration || "3:30"} by ${song.addedBy || "Guest"}`)}</small>
          </div>
          <div class="actions">
            <button class="secondary" data-action="react" data-id="${escapeAttr(song.id)}" data-kind="like">Like ${song.reactions?.like || 0}</button>
            <button class="secondary" data-action="react" data-id="${escapeAttr(song.id)}" data-kind="fire">Fire ${song.reactions?.fire || 0}</button>
            <button class="ghost" data-action="move-up" data-id="${escapeAttr(song.id)}" ${canMove ? "" : "disabled"}>Up</button>
            <button class="ghost" data-action="move-down" data-id="${escapeAttr(song.id)}" ${canMove ? "" : "disabled"}>Down</button>
            <button class="danger" data-action="remove" data-id="${escapeAttr(song.id)}" ${canRemove ? "" : "disabled"}>Remove</button>
          </div>
        </div>`;
    }

    function viewAdd() {
      return `
        <section class="card stack">
          <h3>Search or Paste a Song</h3>
          <label>Song, artist, YouTube link, or Spotify link
            <input data-field="songQuery" value="${escapeAttr(state.songQuery || "")}" placeholder="Paste a YouTube link, or type a song to search">
          </label>
          <div class="suggestions" data-suggestions>${layoutSuggestions()}</div>
          <div class="split">
            <button data-action="add-song">Add YouTube Link</button>
            <button class="secondary" data-action="search-youtube">Search YouTube</button>
          </div>
          <button class="ghost" data-action="import-clipboard">Import copied YouTube link</button>
          <p class="fine">Type to get quick suggestions. Search opens YouTube; after you copy a video link there, return here and import it from your clipboard.</p>
        </section>
        <section class="card" style="margin-top: 16px;">
          <h3>Quick Adds</h3>
          ${seedSongs.map(song => `
            <div class="result">
              <div><strong>${escapeHtml(song[0])} - ${escapeHtml(song[1])}</strong><br><small>${escapeHtml(song[2])} • playable</small></div>
              <button class="secondary" data-action="quick-add" data-artist="${escapeAttr(song[0])}" data-title="${escapeAttr(song[1])}" data-duration="${escapeAttr(song[2])}" data-youtube-id="${escapeAttr(song[3])}">Add</button>
            </div>`).join("")}
        </section>`;
    }

    function layoutSuggestions() {
      return state.suggestions.map((suggestion) =>
        `<button data-action="use-suggestion" data-query="${escapeAttr(suggestion)}">${escapeHtml(suggestion)}</button>`
      ).join("");
    }

    function viewPeople() {
      const isHost = isCurrentHost();
      return `
        ${isHost && state.joinRequests.length ? `
          <section class="card">
            <h3>Join Requests</h3>
            ${state.joinRequests.map((request) => `
              <div class="member">
                <div class="row">
                  <div class="avatar">${escapeHtml(initials(request.name))}</div>
                  <div><strong>${escapeHtml(request.name || "Guest")}</strong><br><small>Guest wants to join</small></div>
                </div>
                <div class="actions">
                  <button data-action="approve-guest" data-id="${escapeAttr(request.id)}">Allow</button>
                  <button class="danger" data-action="deny-guest" data-id="${escapeAttr(request.id)}">Deny</button>
                </div>
              </div>`).join("")}
          </section>
        ` : ""}
        <section class="card">
          <h3>Room Members</h3>
          ${state.members.length ? state.members.map(member => `
            <div class="member">
              <div class="row">
                <div class="avatar">${escapeHtml(initials(member.name))}</div>
                <div><strong>${escapeHtml(member.name || "Guest")}</strong><br><small>${member.id === state.room?.hostId ? "Host" : "Guest"}</small></div>
              </div>
              <span class="badge">${member.online === false ? "Away" : "Here"}</span>
            </div>`).join("") : `<div class="empty">Members appear as they join.</div>`}
        </section>`;
    }

    function layoutJoinRequestPrompt() {
      return `
        <section class="card">
          <h3>Guest Waiting</h3>
          ${state.joinRequests.slice(0, 3).map((request) => `
            <div class="member">
              <div class="row">
                <div class="avatar">${escapeHtml(initials(request.name))}</div>
                <div><strong>${escapeHtml(request.name || "Guest")}</strong><br><small>Wants to join this room</small></div>
              </div>
              <div class="actions">
                <button data-action="approve-guest" data-id="${escapeAttr(request.id)}">Allow</button>
                <button class="danger" data-action="deny-guest" data-id="${escapeAttr(request.id)}">Deny</button>
              </div>
            </div>`).join("")}
        </section>`;
    }

    function viewSettings(isHost) {
      const settings = { ...defaultSettings(), ...(state.room?.settings || {}) };
      return `
        <section class="card stack">
          <h3>Host Controls</h3>
          ${isHost ? "" : `<div class="card settings-note"><strong>Guest access</strong><br><small>Only the host can change playback and permission settings.</small></div>`}
          ${settingToggle("cooldown", "Guest add cooldown", settings.cooldown, isHost)}
          ${settingToggle("guestReorder", "Guests can reorder", settings.guestReorder, isHost)}
          ${settingToggle("guestRemove", "Guests can remove songs", settings.guestRemove, isHost)}
          ${settingToggle("autoDj", "Auto-DJ fallback", settings.autoDj, isHost)}
          ${settingToggle("profanity", "Profanity filter", settings.profanity, isHost)}
          <label>Crossfade seconds
            <input data-field="crossfade" type="range" min="0" max="8" value="${Number(settings.crossfade || 0)}" ${isHost ? "" : "disabled"}>
          </label>
          <button class="danger" data-action="delete-room" ${isHost ? "" : "disabled"}>End Room</button>
        </section>`;
    }

    function settingToggle(key, label, checked, enabled) {
      return `
        <div class="switch-row">
          <div><strong>${escapeHtml(label)}</strong></div>
          <input data-setting="${escapeAttr(key)}" type="checkbox" ${checked ? "checked" : ""} ${enabled ? "" : "disabled"}>
        </div>`;
    }

    function updateApp() {
      const main = root.querySelector("[data-main]");
      if (main) {
        main.innerHTML = layoutMain();
        bind(main);
      }

      root.querySelectorAll("[data-tab]").forEach((el) => {
        el.classList.toggle("active", el.dataset.tab === state.tab);
      });

      const hostPlayer = root.querySelector("[data-host-player]");
      if (hostPlayer) {
        const nextVideoId = isCurrentHost() ? (state.room?.now?.youtubeId || "") : "";
        const currentVideoId = hostPlayer.querySelector("[data-video-id]")?.dataset.videoId || "";
        const hasPlaceholder = !!hostPlayer.querySelector(".card:not([data-video-id])");
        if (nextVideoId !== currentVideoId || (!nextVideoId && !hasPlaceholder)) {
          hostPlayer.innerHTML = hostPlayerContent(isCurrentHost());
        }
      }

      const joinPopup = root.querySelector("[data-join-popup]");
      if (joinPopup) {
        joinPopup.innerHTML = layoutFloatingJoinPopup();
        bind(joinPopup);
      }
    }

    function bind(scope = root) {
      scope.querySelectorAll("[data-action]").forEach((el) => {
        el.addEventListener("click", handleAction);
      });
      scope.querySelectorAll("[data-tab]").forEach((el) => {
        el.addEventListener("click", () => {
          state.tab = el.dataset.tab;
          rememberTab();
          updateUrl();
          clearNotice();
          updateApp();
        });
      });
      scope.querySelectorAll("[data-field]").forEach((el) => {
        el.addEventListener("input", handleField);
      });
      scope.querySelectorAll("[data-setting]").forEach((el) => {
        el.addEventListener("change", () => updateSetting(el.dataset.setting, el.checked));
      });
    }

    async function handleAction(event) {
      const el = event.currentTarget;
      const action = el.dataset.action;
      clearNotice();
      try {
        if (action === "signin") await signIn();
        if (action === "guest-auth") await signInAsGuest();
        if (action === "local-test") startLocalTest();
        if (action === "signout") await logOut();
        if (action === "create") await createRoom();
        if (action === "join") await joinRoom();
        if (action === "leave") leaveRoom();
        if (action === "copy-link") await copyLink();
        if (action === "share") await shareRoom();
        if (action === "skip") await playNext();
        if (action === "add-song") await addSongFromInput();
        if (action === "search-youtube") searchYouTube();
        if (action === "use-suggestion") useSuggestion(el.dataset.query);
        if (action === "import-clipboard") await importClipboardLink();
        if (action === "quick-add") await addSong({ artist: el.dataset.artist, title: el.dataset.title, duration: el.dataset.duration, youtubeId: el.dataset.youtubeId, source: "youtube" });
        if (action === "react") await reactToSong(el.dataset.id, el.dataset.kind);
        if (action === "remove") await removeSong(el.dataset.id);
        if (action === "move-up") await moveSong(el.dataset.id, -1);
        if (action === "move-down") await moveSong(el.dataset.id, 1);
        if (action === "delete-room") await endRoom();
        if (action === "approve-guest") await approveGuest(el.dataset.id);
        if (action === "deny-guest") await denyGuest(el.dataset.id);
        if (action === "cancel-join") await cancelJoinRequest();
      } catch (error) {
        state.busy = false;
        state.error = error.message || "Something went wrong.";
        render();
      }
    }

    function handleField(event) {
      const field = event.currentTarget.dataset.field;
      if (field === "nickname") {
        state.nickname = event.currentTarget.value;
        localStorage.setItem("partyBeatsName", state.nickname);
      }
      if (field === "pendingRoom") state.pendingRoom = cleanRoom(event.currentTarget.value);
      if (field === "songQuery") {
        state.songQuery = event.currentTarget.value;
        state.suggestions = getSuggestions(state.songQuery);
        renderSuggestions();
      }
      if (field === "crossfade") updateSetting("crossfade", Number(event.currentTarget.value));
    }

    async function signIn() {
      state.busy = true;
      state.authMode = "google";
      localStorage.setItem("partyBeatsAuthMode", "google");
      render();
      sessionStorage.setItem("partyBeatsReturningFromGoogle", "1");
      sessionStorage.setItem("partyBeatsReturnUrl", location.href);
      await authReady;
      try {
        const result = await signInWithPopup(auth, provider);
        if (result?.user) acceptUser(result.user);
      } catch (error) {
        if (["auth/popup-blocked", "auth/cancelled-popup-request"].includes(error.code)) {
          await signInWithRedirect(auth, provider);
          return;
        }
        sessionStorage.removeItem("partyBeatsReturningFromGoogle");
        throw new Error(friendlyAuthError(error));
      }
    }

    async function signInAsGuest() {
      state.busy = true;
      state.authMode = "guest";
      localStorage.setItem("partyBeatsAuthMode", "guest");
      render();
      await authReady;
      const result = await signInAnonymously(auth);
      acceptUser(result.user);
    }

    function startLocalTest() {
      if (!isLocalTestHost()) return;
      acceptUser({
        uid: `local-${crypto.randomUUID()}`,
        displayName: state.nickname || "Local Tester",
        email: "local@test.partybeats",
        photoURL: ""
      });
      state.message = "Local test mode is active. Google Auth is still required on the hosted app.";
      render();
    }

    async function logOut() {
      localStorage.removeItem("partyBeatsUser");
      localStorage.removeItem("partyBeatsAuthMode");
      state.authMode = "";
      state.pendingJoin = null;
      state.user = null;
      state.roomId = "";
      state.room = null;
      await signOut(auth);
      render();
    }

    function acceptUser(user) {
      sessionStorage.removeItem("partyBeatsReturningFromGoogle");
      cacheUser(user);
      state.user = user;
      if (user.isAnonymous && !state.authMode) {
        state.authMode = "guest";
        localStorage.setItem("partyBeatsAuthMode", "guest");
      }
      state.booted = true;
      state.busy = false;
      if (!state.nickname) state.nickname = user.displayName || "";
      state.message = "";
      state.error = "";
      render();
    }

    function cacheUser(user) {
      localStorage.setItem("partyBeatsUser", JSON.stringify({
        uid: user.uid,
        displayName: user.displayName || "",
        email: user.email || "",
        photoURL: user.photoURL || "",
        isAnonymous: !!user.isAnonymous
      }));
    }

    function readCachedUser() {
      if (auth.currentUser) return auth.currentUser;
      try {
        const cached = JSON.parse(localStorage.getItem("partyBeatsUser") || "null");
        return cached?.uid ? cached : null;
      } catch {
        return null;
      }
    }

    function isLocalTestHost() {
      return ["localhost", "127.0.0.1"].includes(location.hostname);
    }

    async function createRoom() {
      requireUser();
      if (isGuestUser()) throw new Error("Guests can join rooms, but only Google users can create rooms.");
      const name = requireNickname();
      state.busy = true;
      render();
      let code = randomCode();
      for (let i = 0; i < 8; i += 1) {
        const exists = await getDoc(roomRef(code));
        if (!exists.exists()) break;
        code = randomCode();
      }
      await setDoc(roomRef(code), {
        code,
        hostId: state.user.uid,
        hostName: name,
        settings: defaultSettings(),
        now: null,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      await upsertMember(code, name);
      await enterRoom(code);
    }

    async function joinRoom() {
      requireUser();
      const name = requireNickname();
      const code = cleanRoom(state.pendingRoom);
      if (code.length !== 6) throw new Error("Enter a 6-character room code.");
      const snapshot = await getDoc(roomRef(code));
      if (!snapshot.exists()) throw new Error("Room not found. Check the code and try again.");
      if (isGuestUser()) {
        await requestGuestApproval(code, name);
        return;
      }
      await upsertMember(code, name);
      await enterRoom(code);
    }

    async function requestGuestApproval(code, name) {
      localStorage.setItem("partyBeatsRoom", code);
      const requestRef = doc(db, "rooms", code, "joinRequests", state.user.uid);
      await setDoc(requestRef, {
        id: state.user.uid,
        name,
        status: "pending",
        requestedAt: serverTimestamp()
      }, { merge: true });
      state.pendingJoin = { roomId: code, name };
      state.message = "Request sent. Waiting for the host to allow you in.";
      state.error = "";
      state.unsub.forEach((stop) => stop());
      state.unsub = [
        onSnapshot(requestRef, async (snap) => {
          if (!snap.exists()) {
            state.pendingJoin = null;
            state.error = "The host removed your join request.";
            render();
            return;
          }
          const request = snap.data();
          if (request.status === "approved") {
            state.pendingJoin = null;
            await enterRoom(code);
            return;
          }
          if (request.status === "denied") {
            state.pendingJoin = null;
            state.error = "The host denied your request to join.";
            render();
          }
        })
      ];
      render();
    }

    async function enterRoom(code) {
      state.busy = false;
      state.roomId = code;
      state.pendingRoom = code;
      localStorage.setItem("partyBeatsRoom", code);
      rememberTab();
      updateUrl();
      state.unsub.forEach((stop) => stop());
      state.unsub = [
        onSnapshot(roomRef(code), (snap) => {
          if (!snap.exists()) {
            state.error = "This room has ended.";
            leaveRoom(false);
            return;
          }
          state.room = { id: snap.id, ...snap.data() };
          syncJoinRequests(code);
          render();
        }),
        onSnapshot(query(collection(db, "rooms", code, "queue"), orderBy("order", "asc"), limit(100)), (snap) => {
          state.queue = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          render();
        }),
        onSnapshot(query(collection(db, "rooms", code, "members"), orderBy("joinedAt", "asc")), (snap) => {
          state.members = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          state.member = state.members.find((m) => m.id === state.user?.uid) || state.member;
          render();
        }),
        onSnapshot(query(collection(db, "rooms", code, "history"), orderBy("playedAt", "desc"), limit(10)), (snap) => {
          state.history = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          render();
        })
      ];
      render();
    }

    function syncJoinRequests(code) {
      if (!isCurrentHost()) {
        if (state.joinRequestsUnsub) state.joinRequestsUnsub();
        state.joinRequestsUnsub = null;
        state.joinRequests = [];
        return;
      }
      if (state.joinRequestsUnsub) return;
      state.joinRequestsUnsub = onSnapshot(query(collection(db, "rooms", code, "joinRequests"), orderBy("requestedAt", "asc")), (snap) => {
        state.joinRequests = snap.docs.map((d) => ({ id: d.id, ...d.data() })).filter((request) => request.status === "pending");
        render();
      });
    }

    async function upsertMember(code, name) {
      await setDoc(doc(db, "rooms", code, "members", state.user.uid), {
        id: state.user.uid,
        name,
        email: state.user.email || "",
        photoURL: state.user.photoURL || "",
        guest: isGuestUser(),
        joinedAt: serverTimestamp(),
        lastSeen: serverTimestamp(),
        online: true
      }, { merge: true });
    }

    async function approveGuest(requestId) {
      requireHost();
      const request = state.joinRequests.find((item) => item.id === requestId);
      if (!request) throw new Error("Join request was not found.");
      const batch = writeBatch(db);
      batch.set(doc(db, "rooms", state.roomId, "members", requestId), {
        id: requestId,
        name: request.name || "Guest",
        guest: true,
        approvedBy: state.user.uid,
        joinedAt: serverTimestamp(),
        lastSeen: serverTimestamp(),
        online: true
      }, { merge: true });
      batch.update(doc(db, "rooms", state.roomId, "joinRequests", requestId), {
        status: "approved",
        reviewedAt: serverTimestamp(),
        reviewedBy: state.user.uid
      });
      await batch.commit();
    }

    async function denyGuest(requestId) {
      requireHost();
      await updateDoc(doc(db, "rooms", state.roomId, "joinRequests", requestId), {
        status: "denied",
        reviewedAt: serverTimestamp(),
        reviewedBy: state.user.uid
      });
    }

    async function cancelJoinRequest() {
      if (!state.pendingJoin) return;
      await deleteDoc(doc(db, "rooms", state.pendingJoin.roomId, "joinRequests", state.user.uid));
      localStorage.removeItem("partyBeatsRoom");
      state.pendingJoin = null;
      state.message = "";
      render();
    }

    async function restoreRoomAfterRefresh(code) {
      try {
        const roomSnapshot = await getDoc(roomRef(code));
        if (!roomSnapshot.exists()) {
          localStorage.removeItem("partyBeatsRoom");
          render();
          return;
        }

        const memberSnapshot = await getDoc(doc(db, "rooms", code, "members", state.user.uid));
        if (memberSnapshot.exists()) {
          await enterRoom(code);
          return;
        }

        const requestSnapshot = await getDoc(doc(db, "rooms", code, "joinRequests", state.user.uid));
        if (requestSnapshot.exists()) {
          const request = requestSnapshot.data();
          if (request.status === "pending") {
            state.pendingJoin = { roomId: code, name: request.name || state.nickname || "Guest" };
            state.message = "Request sent. Waiting for the host to allow you in.";
            render();
            return;
          }
          if (request.status === "approved") {
            await enterRoom(code);
            return;
          }
        }

        state.pendingRoom = code;
        render();
      } catch (error) {
        state.error = error.message || "Could not restore your room after refresh.";
        render();
      }
    }

    async function addSongFromInput() {
      const query = (state.songQuery || "").trim();
      if (!query) throw new Error("Type a song or paste a link first.");
      const song = parseSong(query);
      if (!song.youtubeId) throw new Error("Paste a YouTube video link to add a playable song, or use Search YouTube first.");
      await addSong(song);
      state.songQuery = "";
    }

    function searchYouTube() {
      const query = (state.songQuery || "").trim();
      if (!query) throw new Error("Type a song or artist to search.");
      saveRecentSearch(query);
      window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`, "_blank", "noopener");
    }

    function useSuggestion(query) {
      state.songQuery = query || "";
      state.suggestions = getSuggestions(state.songQuery);
      render();
    }

    function renderSuggestions() {
      const container = root.querySelector("[data-suggestions]");
      if (!container) return;
      container.innerHTML = layoutSuggestions();
      container.querySelectorAll("[data-action='use-suggestion']").forEach((el) => {
        el.addEventListener("click", handleAction);
      });
    }

    async function importClipboardLink() {
      const text = await navigator.clipboard?.readText();
      if (!text) throw new Error("Clipboard is empty or blocked by the browser.");
      const song = parseSong(text.trim());
      if (!song.youtubeId) throw new Error("The clipboard does not contain a YouTube video link.");
      state.songQuery = text.trim();
      state.suggestions = [];
      await addSong(song);
    }

    async function addSong(song) {
      requireRoom();
      const name = state.member?.name || state.nickname || "Guest";
      const newRef = doc(collection(db, "rooms", state.roomId, "queue"));
      await setDoc(newRef, {
        artist: song.artist || "Requested",
        title: song.title || "Untitled song",
        duration: song.duration || "3:30",
        source: song.source || "request",
        youtubeId: song.youtubeId || "",
        url: song.url || "",
        addedBy: name,
        addedById: state.user.uid,
        reactions: { like: 0, fire: 0 },
        order: Date.now(),
        createdAt: serverTimestamp()
      });
      state.message = "Added to the queue.";
      state.tab = "queue";
      render();
    }

    async function playNext() {
      requireHost();
      const current = state.room?.now;
      const next = state.queue[0] || null;
      const batch = writeBatch(db);
      if (current) {
        batch.set(doc(collection(db, "rooms", state.roomId, "history")), {
          ...current,
          playedAt: serverTimestamp()
        });
      }
      if (next) batch.delete(doc(db, "rooms", state.roomId, "queue", next.id));
      batch.update(roomRef(state.roomId), { now: next ? stripId(next) : null, updatedAt: serverTimestamp() });
      await batch.commit();
    }

    async function reactToSong(id, kind) {
      requireRoom();
      await updateDoc(doc(db, "rooms", state.roomId, "queue", id), {
        [`reactions.${kind}`]: increment(1)
      });
    }

    async function removeSong(id) {
      requireRoom();
      const canRemove = isCurrentHost() || state.room?.settings?.guestRemove;
      if (!canRemove) throw new Error("Only the host can remove songs.");
      await deleteDoc(doc(db, "rooms", state.roomId, "queue", id));
    }

    async function moveSong(id, direction) {
      requireRoom();
      const canMove = isCurrentHost() || state.room?.settings?.guestReorder;
      if (!canMove) throw new Error("Only the host can reorder songs.");
      const index = state.queue.findIndex((song) => song.id === id);
      const target = index + direction;
      if (index < 0 || target < 0 || target >= state.queue.length) return;
      const a = state.queue[index];
      const b = state.queue[target];
      const batch = writeBatch(db);
      batch.update(doc(db, "rooms", state.roomId, "queue", a.id), { order: b.order });
      batch.update(doc(db, "rooms", state.roomId, "queue", b.id), { order: a.order });
      await batch.commit();
    }

    async function updateSetting(key, value) {
      if (!state.roomId || !isCurrentHost()) return;
      await updateDoc(roomRef(state.roomId), {
        [`settings.${key}`]: value,
        updatedAt: serverTimestamp()
      });
    }

    async function endRoom() {
      requireHost();
      await deleteDoc(roomRef(state.roomId));
      leaveRoom();
    }

    function leaveRoom(updateUrl = true) {
      state.unsub.forEach((stop) => stop());
      if (state.joinRequestsUnsub) state.joinRequestsUnsub();
      state.joinRequestsUnsub = null;
      state.unsub = [];
      state.roomId = "";
      state.room = null;
      state.member = null;
      state.queue = [];
      state.members = [];
      state.joinRequests = [];
      state.history = [];
      state.tab = "queue";
      localStorage.removeItem("partyBeatsRoom");
      sessionStorage.setItem("partyBeatsTab", "queue");
      if (updateUrl) history.replaceState(null, "", location.pathname);
      render();
    }

    async function copyLink() {
      const link = roomLink();
      await navigator.clipboard?.writeText(link);
      state.message = "Room link copied.";
      render();
    }

    async function shareRoom() {
      const link = roomLink();
      if (navigator.share) {
        await navigator.share({ title: "Join Party Beats", text: `Join room ${state.roomId}`, url: link });
      } else {
        await navigator.clipboard?.writeText(link);
        state.message = "Share is not available here, so the room link was copied.";
        render();
      }
    }

    function defaultSettings() {
      return {
        cooldown: true,
        guestReorder: false,
        guestRemove: false,
        autoDj: true,
        profanity: true,
        crossfade: 4
      };
    }

    function parseSong(query) {
      const cleaned = query.replace(/\s+/g, " ").trim();
      const youtubeId = extractYouTubeId(cleaned);
      if (youtubeId) {
        return {
          artist: "YouTube",
          title: cleaned,
          duration: "Video",
          source: "youtube",
          youtubeId,
          url: cleaned
        };
      }
      const split = cleaned.split(" - ");
      if (split.length >= 2) return { artist: split[0], title: split.slice(1).join(" - "), source: "typed" };
      if (/https?:\/\//i.test(cleaned)) return { artist: "Link request", title: cleaned, source: "link" };
      return { artist: "Requested", title: cleaned, source: "typed" };
    }

    function extractYouTubeId(value) {
      try {
        const url = new URL(value);
        if (url.hostname.includes("youtu.be")) return validYouTubeId(url.pathname.slice(1));
        if (url.hostname.includes("youtube.com")) {
          if (url.pathname.startsWith("/watch")) return validYouTubeId(url.searchParams.get("v"));
          if (url.pathname.startsWith("/shorts/") || url.pathname.startsWith("/embed/")) {
            return validYouTubeId(url.pathname.split("/")[2]);
          }
        }
      } catch {
        return "";
      }
      return "";
    }

    function validYouTubeId(value) {
      const id = String(value || "").trim();
      return /^[A-Za-z0-9_-]{11}$/.test(id) ? id : "";
    }

    function getSuggestions(query) {
      const text = String(query || "").trim().toLowerCase();
      if (text.length < 2 || extractYouTubeId(text)) return [];
      const recent = readRecentSearches();
      const candidates = [...recent, ...suggestionSeeds];
      const seen = new Set();
      return candidates
        .filter((item) => {
          const normalized = item.toLowerCase();
          const match = normalized.includes(text) || text.split(/\s+/).every((part) => normalized.includes(part));
          if (!match || seen.has(normalized)) return false;
          seen.add(normalized);
          return true;
        })
        .slice(0, 6);
    }

    function saveRecentSearch(query) {
      const value = String(query || "").trim();
      if (!value || extractYouTubeId(value)) return;
      const recent = [value, ...readRecentSearches().filter((item) => item.toLowerCase() !== value.toLowerCase())].slice(0, 10);
      localStorage.setItem("partyBeatsRecentSearches", JSON.stringify(recent));
    }

    function readRecentSearches() {
      try {
        const recent = JSON.parse(localStorage.getItem("partyBeatsRecentSearches") || "[]");
        return Array.isArray(recent) ? recent.filter(Boolean) : [];
      } catch {
        return [];
      }
    }

    function requireUser() {
      if (!state.user) throw new Error("Sign in with Google first.");
    }

    function requireRoom() {
      requireUser();
      if (!state.roomId) throw new Error("Create or join a room first.");
    }

    function requireHost() {
      requireRoom();
      if (!isCurrentHost()) throw new Error("Only the host can control playback.");
    }

    function requireNickname() {
      const name = (state.nickname || "").trim();
      if (name.length < 2) throw new Error("Enter a nickname first.");
      localStorage.setItem("partyBeatsName", name);
      return name;
    }

    function isCurrentHost() {
      return !!state.user && state.room?.hostId === state.user.uid;
    }

    function isGuestUser() {
      return state.authMode === "guest" || !!state.user?.isAnonymous;
    }

    function roomRef(code) {
      return doc(db, "rooms", code);
    }

    function roomLink() {
      return `${location.origin}${location.pathname}?room=${state.roomId}`;
    }

    function updateUrl() {
      if (!state.roomId) return;
      const next = `?room=${state.roomId}&tab=${state.tab}`;
      if (`${location.search}` !== next) history.replaceState(null, "", next);
    }

    function rememberTab() {
      state.tab = cleanTab(state.tab);
      sessionStorage.setItem("partyBeatsTab", state.tab);
    }

    function cleanTab(value) {
      return ["queue", "add", "people", "settings"].includes(value) ? value : "queue";
    }

    function randomCode() {
      const crypto = window.crypto || window.msCrypto;
      const bytes = new Uint8Array(6);
      crypto.getRandomValues(bytes);
      return Array.from(bytes, (byte) => alphabet[byte % alphabet.length]).join("");
    }

    function cleanRoom(value) {
      return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 6);
    }

    function initials(value) {
      return String(value || "PB").split(/\s+/).filter(Boolean).slice(0, 2).map((word) => word[0]).join("").toUpperCase() || "PB";
    }

    function stripId(song) {
      const { id, ...rest } = song;
      return rest;
    }

    function clearNotice() {
      state.error = "";
      state.message = "";
    }

    function friendlyAuthError(error) {
      if (error?.code === "auth/unauthorized-domain") return "Add this domain in Firebase Auth settings, then try again.";
      if (error?.code === "auth/popup-blocked") return "The popup was blocked, so Party Beats will use redirect sign-in.";
      return error?.message || "Google sign-in failed.";
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    render();
  </script>
</body>
</html>
